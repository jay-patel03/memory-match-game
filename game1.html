<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match Game</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

.score{
    font-size:22px;
    margin:20px;
}

.game{
    width:360px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(4,80px);
    gap:10px;
}

.card{
    width:80px;
    height:80px;
    background:#3498db;
    color: #222;
    font-size:35px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border-radius:10px;
    user-select:none;
}

.card.matched{
    background:#2ecc71;
}

@media(max-width:500px){

.game{
    width:280px;
    grid-template-columns:repeat(4,60px);
}

.card{
    width:60px;
    height:60px;
    font-size:28px;
}

}

</style>

</head>
<body>

<h1>Memory Match Game</h1>

<p>Match all pairs to win!</p>

<h3 id="turn">Player 1 Turn</h3>

<div class="score">

Player 1 :
<span id="p1">0</span>

&nbsp;&nbsp;&nbsp;

Player 2 :
<span id="p2">0</span>

</div>

<div class="game" id="game"></div>


<div class="modal fade" id="winnerModal">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">

<h4 class="modal-title" style="color: #222;">Game Over</h4>

</div>

<div class="modal-body">

<h2 id="winnerText" style="color: #222;"></h2>

</div>

<div class="modal-footer">

<button class="btn btn-primary" onclick="location.reload()">
Play Again
</button>

</div>

</div>

</div>

</div>

<script>

const game=document.getElementById("game");

let values=[1,1,2,2,3,3,4,4];

values.sort(()=>Math.random()-0.5);

let firstCard=null;
let secondCard=null;
let lockBoard=false;

let matchedPairs=0;

let currentPlayer=1;

let player1Score=0;
let player2Score=0;

values.forEach(value=>{

const card=document.createElement("div");

card.className="card";

card.dataset.value=value;

card.innerHTML="?";

card.addEventListener("click",flipCard);

game.appendChild(card);

});

function flipCard(){

if(lockBoard || this==firstCard || this.classList.contains("matched"))
return;

this.innerHTML=this.dataset.value;

if(firstCard==null){

firstCard=this;

return;

}

secondCard=this;

lockBoard=true;

if(firstCard.dataset.value===secondCard.dataset.value){

firstCard.classList.add("matched");
secondCard.classList.add("matched");

if(currentPlayer==1){

player1Score++;

document.getElementById("p1").innerHTML=player1Score;

}
else{

player2Score++;

document.getElementById("p2").innerHTML=player2Score;

}

matchedPairs++;

resetTurn();

if(matchedPairs==4){

setTimeout(showWinner,300);

}

}
else{

setTimeout(()=>{

firstCard.innerHTML="?";
secondCard.innerHTML="?";

currentPlayer=currentPlayer==1?2:1;

document.getElementById("turn").innerHTML=
"Player "+currentPlayer+" Turn";

resetTurn();

},1000);

}

}

function resetTurn(){

firstCard=null;
secondCard=null;
lockBoard=false;

}

function showWinner() {

let winnerText = "";

if(player1Score > player2Score){

    winnerText = "🏆 Player 1 Wins!";

}
else if(player2Score > player1Score){

    winnerText = "🏆 Player 2 Wins!";

}
else{

    winnerText = "🤝 Match Draw!";

}

document.getElementById("winnerText").innerHTML = winnerText;

const winnerModal = new bootstrap.Modal(
    document.getElementById("winnerModal")
);

winnerModal.show();

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
