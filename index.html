<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
    text-align:center;
    padding:20px;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    margin-bottom:15px;
}

#turn{
    color:red;
    margin-bottom:15px;
}

.score{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.game{
    width:100%;
    max-width:420px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.card{
    aspect-ratio:1/1;
    background:#0d6efd;
    color:#fff;
    font-size:35px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    user-select:none;
}

.card:hover{
    transform:scale(1.05);
}

.card.matched{
    background:green;
    cursor:not-allowed;
}

/* Tablet */
@media(max-width:768px){

h1{
    font-size:32px;
}

.score{
    font-size:20px;
}

.game{
    max-width:360px;
}

.card{
    font-size:30px;
}

}

/* Mobile */
@media(max-width:480px){

body{
    padding:15px;
}

h1{
    font-size:26px;
}

p{
    font-size:16px;
}

.score{
    font-size:18px;
    line-height:1.8;
}

.game{
    max-width:300px;
    gap:8px;
}

.card{
    font-size:24px;
    border-radius:8px;
}

.modal-dialog{
    margin:15px;
}

.modal-body h2{
    font-size:22px;
}

.modal-footer button{
    width:100%;
}

}

</style>
</head>
<body>

<h1>Memory Match Game</h1>
<p>Match all pairs to win!</p>

<h3 id="turn">Player 1 Turn</h3>

<div class="score">
Player 1 :
<span id="p1">0</span>

&nbsp;&nbsp;&nbsp;

Player 2 :
<span id="p2">0</span>
</div>

<div class="game" id="game"></div>


<!-- Winner Modal -->

<div class="modal fade" id="winnerModal">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">
<h4 class="modal-title">Game Over</h4>
</div>

<div class="modal-body">
<h2 id="winnerText"></h2>
</div>

<div class="modal-footer">
<button class="btn btn-primary" onclick="location.reload()">
Play Again
</button>
</div>

</div>

</div>

</div>


<script>

const game=document.getElementById("game");

let values=[1,1,2,2,3,3,4,4];

values.sort(()=>Math.random()-0.5);

let firstCard=null;
let secondCard=null;
let lockBoard=false;

let matchedPairs=0;

let currentPlayer=1;

let player1Score=0;
let player2Score=0;



values.forEach(value=>{

const card=document.createElement("div");

card.className="card";

card.dataset.value=value;

card.innerHTML="?";

card.addEventListener("click",flipCard);

game.appendChild(card);

});


function flipCard(){

if(lockBoard || this==firstCard || this.classList.contains("matched"))
return;

this.innerHTML=this.dataset.value;

if(firstCard==null){

firstCard=this;
return;

}

secondCard=this;

lockBoard=true;


if(firstCard.dataset.value===secondCard.dataset.value){

firstCard.classList.add("matched");
secondCard.classList.add("matched");


if(currentPlayer==1){

player1Score++;

document.getElementById("p1").innerHTML=player1Score;

}
else{

player2Score++;

document.getElementById("p2").innerHTML=player2Score;

}

matchedPairs++;

resetTurn();


if(matchedPairs==4){

setTimeout(showWinner,300);

}

}
else{

setTimeout(()=>{

firstCard.innerHTML="?";
secondCard.innerHTML="?";

currentPlayer=currentPlayer==1?2:1;

document.getElementById("turn").innerHTML=
"Player "+currentPlayer+" Turn";

resetTurn();

},1000);

}

}



function resetTurn(){

firstCard=null;
secondCard=null;
lockBoard=false;

}



function showWinner(){

let text="";

if(player1Score>player2Score){

text="🎉 Player 1 Wins!";

}
else if(player2Score>player1Score){

text="🎉 Player 2 Wins!";

}
else{

text="🤝 Match Draw!";

}

document.getElementById("winnerText").innerHTML=text;

new bootstrap.Modal(document.getElementById("winnerModal")).show();

}

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
